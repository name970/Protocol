name: Task / good first issue
description: A scoped, self-contained piece of work
labels: ["good first issue"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What part of the system this touches (link the ARCHITECTURE.md row).
    validations: { required: true }
  - type: textarea
    id: task
    attributes:
      label: Task
    validations: { required: true }
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we know it's done.
    validations: { required: true }
  - type: input
    id: pointer
    attributes:
      label: Code pointer
      description: Which module/file to look at.
